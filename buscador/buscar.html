<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar en la Enciclopedia Médica</title>
</head>
<body>
    <header>
        <a href="../index.html">
            <img src="../imagenes/logo.png" alt="Logo de MedlinePlus" width="400" height="200">
        </a>
        <h1>MedlinePlus</h1>
        <p>Información de salud para usted</p>
    </header>

    <main>
        <section id="buscador">
            <h2>Buscar en la Enciclopedia</h2>
	    <p>Nota: Los campos marcados con * son obligatorios.</p>
            <form action="respuestabuscador.html" method="GET">
                <label for="descripcion">* Descripción:</label>
                <input type="text" id="descripcion" name="descripcion" placeholder="Ingrese la descripción del artículo" required><br>

                <label for="causas">Causas:</label>
                <input type="text" id="causas" name="causas" placeholder="Ingrese las causas del artículo"><br>

                <label for="sintomas">Síntomas:</label>
                <input type="text" id="sintomas" name="sintomas" placeholder="Ingrese los síntomas del artículo"><br>

                <label for="examenes">Pruebas y exámenes:</label>
                <input type="text" id="examenes" name="examenes" placeholder="Ingrese las pruebas o exámenes del artículo"><br>

                <label for="tratamiento">Tratamiento:</label>
                <input type="text" id="tratamiento" name="tratamiento" placeholder="Ingrese el tratamiento del artículo"><br>

                <label for="expectativas">Expectativas:</label>
                <input type="text" id="expectativas" name="expectativas" placeholder="Ingrese las expectativas del artículo"><br>

                <input type="submit" value="Buscar">
            </form>
            <p>Para volver a la página principal pulsa <a href="../index.html">aquí</a>.</p>
        </section>
    </main>

    <footer>
        <p><a href="mailto:egs98@alu.ua.es">Eva Gutiérrez Sánchez</a> &copy; <span lang="en">egs98@alu.ua.es</span></p>
        <p><a href="../declaracionaccesibilidad.html">Declaración de Accesibilidad</a></p>
	<p>Universidad de Alicante</p>
    </footer>
</body>
</html>
